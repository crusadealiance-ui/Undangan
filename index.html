<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan — Huda & Ajeng</title>
    
    <meta property="og:title" content="The Wedding of Huda & Ajeng">
    <meta property="og:description" content="Kami mengundang Anda untuk merayakan cinta kami di Blitar.">
    <meta property="og:image" content="1000506896.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Pinyon+Script&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ivory: #F8F3EC;
            --deep-ivory: #F0E8DC;
            --gold: #C9A96E;
            --gold-light: #E8D5B0;
            --gold-dark: #9E7B45;
            --charcoal: #2C2420;
            --warm-brown: #6B4F3A;
            --blush: #D4A5A0;
            --sage: #8B9E8A;
            --text-muted: #9A8070;
            --text-dark: #3A2E28;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--ivory);
            color: var(--text-dark);
            overflow-x: hidden;
            overflow-y: hidden;
            cursor: default;
        }

        /* ─────────────────────────────────────────
           NOISE TEXTURE OVERLAY
        ───────────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─────────────────────────────────────────
           CUSTOM CURSOR
        ───────────────────────────────────────── */
        .cursor-dot {
            position: fixed;
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }
        .cursor-ring {
            position: fixed;
            width: 28px; height: 28px;
            border: 1px solid rgba(201, 169, 110, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
        }

        /* ─────────────────────────────────────────
           COVER PAGE
        ───────────────────────────────────────── */
        #cover-page {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: clip-path 1.4s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.2s ease;
            clip-path: inset(0% 0% 0% 0%);
        }

        #cover-page.open {
            clip-path: inset(0% 0% 100% 0%);
            opacity: 0;
        }

        .cover-bg {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(160deg, rgba(28, 18, 12, 0.55) 0%, rgba(12, 8, 5, 0.85) 100%),
                url('1000506896.jpg') center/cover no-repeat;
            animation: slow-pan 30s infinite alternate ease-in-out;
        }

        @keyframes slow-pan {
            0% { transform: scale(1) translateX(0); }
            100% { transform: scale(1.08) translateX(-2%); }
        }

        /* Decorative lines */
        .cover-lines {
            position: absolute;
            inset: 30px;
            border: 1px solid rgba(201, 169, 110, 0.2);
            pointer-events: none;
            z-index: 2;
        }
        .cover-lines::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201, 169, 110, 0.12);
        }

        /* Corner ornaments */
        .cover-corner {
            position: absolute;
            width: 50px; height: 50px;
            z-index: 3;
            pointer-events: none;
        }
        .cover-corner svg { width: 100%; height: 100%; }
        .cover-corner.tl { top: 38px; left: 38px; }
        .cover-corner.tr { top: 38px; right: 38px; transform: scaleX(-1); }
        .cover-corner.bl { bottom: 38px; left: 38px; transform: scaleY(-1); }
        .cover-corner.br { bottom: 38px; right: 38px; transform: scale(-1); }

        .cover-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
            padding: 20px;
            max-width: 460px;
            width: 100%;
        }

        .cover-tagline {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 0.7em;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold-light);
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .cover-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin: 18px 0;
        }
        .cover-divider::before, .cover-divider::after {
            content: '';
            flex: 1;
            max-width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(201, 169, 110, 0.6));
        }
        .cover-divider::after {
            background: linear-gradient(to left, transparent, rgba(201, 169, 110, 0.6));
        }

        .cover-names {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(4em, 12vw, 6em);
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 4px 30px rgba(201, 169, 110, 0.3);
            margin: 8px 0;
        }

        .cover-date-box {
            margin: 28px auto;
            padding: 14px 30px;
            border: 1px solid rgba(201, 169, 110, 0.35);
            display: inline-block;
            position: relative;
        }
        .cover-date-box::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid rgba(201, 169, 110, 0.15);
        }
        .cover-date-text {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.78em;
            letter-spacing: 4px;
            color: var(--gold-light);
            text-transform: uppercase;
        }

        .cover-guest-label {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 0.75em;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .cover-guest-name {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.5em;
            color: var(--gold-light);
            margin-bottom: 32px;
            min-height: 1.8em;
        }

        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            border: 1px solid rgba(201, 169, 110, 0.7);
            color: var(--gold-light);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.75em;
            letter-spacing: 5px;
            text-transform: uppercase;
            padding: 16px 36px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-open::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(201, 169, 110, 0.1);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .btn-open:hover::before { transform: scaleX(1); }
        .btn-open:hover { border-color: var(--gold); color: #fff; }
        .btn-open svg { width: 14px; height: 14px; animation: float-y 2s ease-in-out infinite; }
        @keyframes float-y {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ─────────────────────────────────────────
           MAIN CONTENT
        ───────────────────────────────────────── */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease 0.5s;
        }
        #main-content.reveal { opacity: 1; }

        /* ─────────────────────────────────────────
           SECTION BASE
        ───────────────────────────────────────── */
        .section {
            padding: 100px 24px;
            position: relative;
            overflow: hidden;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* ─────────────────────────────────────────
           SCROLL REVEAL
        ───────────────────────────────────────── */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1), transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-up.active { opacity: 1; transform: translateY(0); }
        .fade-up:nth-child(2) { transition-delay: 0.1s; }
        .fade-up:nth-child(3) { transition-delay: 0.2s; }
        .fade-up:nth-child(4) { transition-delay: 0.3s; }

        /* ─────────────────────────────────────────
           SECTION LABEL
        ───────────────────────────────────────── */
        .section-label {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.68em;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
            display: block;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(2.2em, 5vw, 3em);
            font-weight: 300;
            color: var(--charcoal);
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .gold-rule {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            justify-content: center;
        }
        .gold-rule::before, .gold-rule::after {
            content: '';
            height: 1px;
            width: 60px;
            background: linear-gradient(to right, transparent, var(--gold-light));
        }
        .gold-rule::after { background: linear-gradient(to left, transparent, var(--gold-light)); }
        .gold-rule-icon { color: var(--gold); font-size: 0.9em; }

        /* ─────────────────────────────────────────
           HERO SECTION
        ───────────────────────────────────────── */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            position: relative;
            background: var(--ivory);
        }

        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
        }

        .hero-photo-wrapper {
            position: relative;
            width: min(320px, 75vw);
            margin: 0 auto 48px;
        }
        .hero-photo-arch {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 200px 200px 0 0;
            overflow: hidden;
            border: 1px solid var(--gold-light);
            position: relative;
        }
        .hero-photo-arch img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 8s ease;
        }
        .hero-photo-arch:hover img { transform: scale(1.05); }
        
        /* Subtle arch ornament */
        .arch-accent {
            position: absolute;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            top: -10px; left: -10px;
            border-radius: 210px 210px 0 0;
            border: 1px solid rgba(201, 169, 110, 0.25);
            pointer-events: none;
        }
        .arch-accent-2 {
            position: absolute;
            width: calc(100% + 38px);
            height: calc(100% + 38px);
            top: -19px; left: -19px;
            border-radius: 220px 220px 0 0;
            border: 1px solid rgba(201, 169, 110, 0.12);
            pointer-events: none;
        }

        .hero-script {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3.5em, 10vw, 5.5em);
            color: var(--charcoal);
            line-height: 1;
            margin-bottom: 4px;
        }
        .hero-ampersand {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2em, 6vw, 2.8em);
            color: var(--gold);
            display: block;
            margin: 4px 0;
        }

        /* ─────────────────────────────────────────
           AYAT SECTION
        ───────────────────────────────────────── */
        #ayat {
            background: var(--charcoal);
            padding: 90px 24px;
        }
        .ayat-wrapper {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .ayat-arabic {
            font-size: clamp(1.3em, 4vw, 1.8em);
            color: var(--gold-light);
            line-height: 2.2;
            margin-bottom: 28px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }
        .ayat-terjemahan {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.05em;
            color: rgba(248, 243, 236, 0.7);
            line-height: 1.9;
        }
        .ayat-source {
            display: inline-block;
            margin-top: 20px;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.72em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ─────────────────────────────────────────
           MEMPELAI SECTION
        ───────────────────────────────────────── */
        #mempelai {
            background: var(--ivory);
            padding: 100px 24px;
        }

        .couple-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            max-width: 680px;
            margin: 50px auto 0;
        }
        .couple-card { text-align: center; }
        .couple-name {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2.2em, 6vw, 3em);
            color: var(--charcoal);
            line-height: 1;
            margin-bottom: 12px;
        }
        .couple-fullname {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95em;
            color: var(--warm-brown);
            margin-bottom: 8px;
            font-style: italic;
        }
        .couple-parents {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.75em;
            color: var(--text-muted);
            line-height: 1.7;
            letter-spacing: 0.3px;
        }
        .couple-parents strong {
            display: block;
            font-weight: 400;
            color: var(--warm-brown);
        }

        .couple-ampersand-center {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3em, 8vw, 4.5em);
            color: var(--gold);
            line-height: 1;
        }

        .couple-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--gold-light), transparent);
            margin: 16px auto;
        }

        /* ─────────────────────────────────────────
           ACARA SECTION
        ───────────────────────────────────────── */
        #acara {
            background: linear-gradient(180deg, #F3EDE3 0%, var(--ivory) 100%);
        }

        .event-cards {
            display: grid;
            gap: 20px;
            max-width: 640px;
            margin: 50px auto 0;
        }
        .event-card {
            border: 1px solid var(--gold-light);
            padding: 40px 36px;
            background: #fff;
            position: relative;
            text-align: left;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 28px;
            align-items: start;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .event-card:hover {
            box-shadow: 0 20px 50px rgba(201, 169, 110, 0.12);
            transform: translateY(-3px);
        }
        .event-card::after {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(201, 169, 110, 0.1);
            pointer-events: none;
        }

        .event-icon {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--gold-light);
            color: var(--gold);
            flex-shrink: 0;
        }
        .event-icon svg { width: 22px; height: 22px; }

        .event-type {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.68em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }
        .event-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            font-weight: 600;
            color: var(--charcoal);
            margin-bottom: 10px;
        }
        .event-detail {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.82em;
            color: var(--text-muted);
            line-height: 1.8;
        }
        .event-detail strong {
            color: var(--warm-brown);
            font-weight: 400;
        }

        /* ─────────────────────────────────────────
           LOKASI SECTION
        ───────────────────────────────────────── */
        #lokasi {
            background: var(--ivory);
        }
        .lokasi-box {
            max-width: 560px;
            margin: 40px auto 0;
            text-align: center;
        }
        .lokasi-address {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2em;
            color: var(--warm-brown);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .qr-wrapper {
            display: inline-block;
            padding: 16px;
            border: 1px solid var(--gold-light);
            background: #fff;
            margin-bottom: 24px;
            position: relative;
        }
        .qr-wrapper::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(
